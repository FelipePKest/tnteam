# Experiment naming
name: "poam_type_conditional"
label: "baseline"
local_results_path: naht_results/mpe-pp/open_eval/type_conditional

# --- Defaults for type-conditional evaluation ---

runner: "parallel"
mac: "open_eval_mac"
eval_mode: "open"
env: "gymma"
non_overridable: ['mac']
env_args:
  key: "mpe:PredatorPrey-v0"
  pretrained_wrapper: "PretrainedTag"
  time_limit: 100
  record_video: False
render: False
batch_size_run: 8
test_nepisode: 128
t_max: 0
use_cuda: True
buffer_cpu_only: True
log_discounted_return: False
use_tensorboard: False
test_verbose: False
save_replay: False

# Runtime defaults needed when launching this config directly via src/main.py.
hidden_dim: 64
agent: "rnn"
use_rnn: True
obs_agent_id: True
obs_last_action: True
gamma: 0.99
batch_size: 32
buffer_size: 32
lr: 0.0005
optim_alpha: 0.99
optim_eps: 0.00001
grad_norm_clip: 10
add_value_last_step: True
repeat_id: 1
ed_hidden_dim: 64
embed_dim: 64

# Classifier hyperparameters (overridable via CLI)
classifier_d_model: 128
classifier_nhead: 4
classifier_layers: 2
classifier_ff: 256
classifier_dropout: 0.1
classifier_lr: 0.0001
classifier_weight_decay: 0.0

# Teammate configuration
n_uncontrolled: 2
trained_agents:
  agent_classifier_pool:
    agent_loader: type_conditional_loader
    n_agents_to_populate: 3
    classifier:
      checkpoint: "/Users/felipekestelman/Git/tnteam/classifier.th"
      history_len: 32
      d_model: 128
      nhead: 4
      num_layers: 2
      ff: 256
      dropout: 0.1
    teammate_types:
      - name: ippo
        agent_loader: poam_eval_agent_loader
        agent_path: naht_results/mpe-pp/open_train/poam-pqvmq_open/models/poam_baseline_seed=112358_04-02-03-00-00
        load_step: best
        test_mode: True
      - name: qmix
        agent_loader: poam_eval_agent_loader
        agent_path: naht_results/mpe-pp/open_train/poam-pqvmq_open/models/poam_baseline_seed=112358_04-01-10-29-18
        load_step: best
        test_mode: True
      - name: vdn
        agent_loader: poam_eval_agent_loader
        agent_path: naht_results/mpe-pp/open_train/poam-pqvmq_open/models/poam_baseline_seed=112358_04-01-01-07-32
        load_step: best
        test_mode: True
      - name: mappo
        agent_loader: poam_eval_agent_loader
        agent_path: naht_results/mpe-pp/open_train/poam-pqvmq_open/models/poam_baseline_seed=112358_03-31-11-48-33
        load_step: best
        test_mode: True
      - name: iql
        agent_loader: poam_eval_agent_loader
        agent_path: naht_results/mpe-pp/open_train/poam-pqvmq_open/models/poam_baseline_seed=112358_03-30-16-09-21
        load_step: best
        test_mode: True
uncntrl_agents:
  agent_ippo:
    agent_loader: rnn_eval_agent_loader
    agent_path: naht_results/mpe-pp/ippo/models/ippo_baseline_seed=112358_07-10-14-39-17
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_qmix:
    agent_loader: rnn_eval_agent_loader
    agent_path: naht_results/mpe-pp/qmix/models/qmix_baseline_seed=112358_04-24-12-09-32
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_vdn:
    agent_loader: rnn_eval_agent_loader
    agent_path: naht_results/mpe-pp/vdn/models/vdn_baseline_seed=112358_04-24-12-11-09
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_mappo:
    agent_loader: rnn_eval_agent_loader
    agent_path: naht_results/mpe-pp/mappo/models/mappo_baseline_seed=112358_04-24-12-04-31
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_iql:
    agent_loader: rnn_eval_agent_loader
