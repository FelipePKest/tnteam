# Classifier-only training configuration
# Uses fixed pre-trained POAM policies and only trains the classifier weights
# This ensures training distribution matches evaluation distribution

name: "poam_classifier_only"
local_results_path: mpe-pp/open_train/poam_classifier_only

# --- pymarl options ---
runner: "parallel"
mac: "open_train_mac"
env: "gymma"
non_overridable: ['mac']
env_args:
  key: "mpe:PredatorPrey-v0"
  pretrained_wrapper: "PretrainedTag"
  time_limit: 100
  record_video: False
batch_size_run: 8
test_nepisode: 128
test_interval: 50000
test_greedy: True

log_interval: 50000
runner_log_interval: 50000
learner_log_interval: 50000
t_max: 20050000
use_cuda: True
buffer_cpu_only: True
log_discounted_return: False

# --- Classifier hyperparameters ---
classifier_d_model: 128
classifier_nhead: 4
classifier_layers: 2
classifier_ff: 256
classifier_dropout: 0.1
classifier_lr: 0.0001
classifier_weight_decay: 0.0
classifier_history_len: 32

# --- Logging/eval options ---
use_tensorboard: True
save_model: True
save_model_interval: 1000000
checkpoint_path: ""
render: False

# --- Learner settings ---
learner: "classifier_learner"
agent: "rnn_poam"
hidden_dim: 64
use_rnn: True
obs_agent_id: True
obs_last_action: True
obs_state: False
obs_individual_obs: False
obs_team_composition: False

gamma: 0.99
batch_size: 256
buffer_size: 256
lr: 0.0005
optim_alpha: 0.99
optim_eps: 0.00001
grad_norm_clip: 10
add_value_last_step: True

# Encoder settings (required for POAM)
ed_hidden_dim: 64
embed_dim: 64

# --- Open train Parameters ---
test_verbose: False
save_replay: False
eval_mode: null
n_uncontrolled: 2

# --- Pre-trained POAM policies (one per uncontrolled type) ---
# IMPORTANT: policy_configs ORDER must match uncntrl_agents keys ORDER
trained_agents:
  agent_0:
    agent_loader: type_matched_train_loader
    base_path: "naht_results/mpe-pp/open_train/poam-pqvmq_open/models"
    policy_configs:
      # Index 0: IPPO (matches agent_ippo)
      - name: ippo
        agent_loader: poam_eval_agent_loader
        agent_path: poam_baseline_seed=112358_04-02-03-00-00
        load_step: best
        test_mode: True
      # Index 1: QMIX (matches agent_qmix)
      - name: qmix
        agent_loader: poam_eval_agent_loader
        agent_path: poam_baseline_seed=112358_04-01-10-29-18
        load_step: best
        test_mode: True
      # Index 2: VDN (matches agent_vdn)
      - name: vdn
        agent_loader: poam_eval_agent_loader
        agent_path: poam_baseline_seed=112358_04-01-01-07-32
        load_step: best
        test_mode: True
      # Index 3: MAPPO (matches agent_mappo)
      - name: mappo
        agent_loader: poam_eval_agent_loader
        agent_path: poam_baseline_seed=112358_03-31-11-48-33
        load_step: best
        test_mode: True
      # Index 4: IQL (matches agent_iql)
      - name: iql
        agent_loader: poam_eval_agent_loader
        agent_path: poam_baseline_seed=112358_03-30-16-09-21
        load_step: best
        test_mode: True

# --- Uncontrolled agents to train against ---
# ORDER of keys matters - must match policy_configs order
uncntrl_agents:
  agent_ippo:
    agent_loader: rnn_eval_agent_loader
    agent_path: mpe-pp/ippo/models/ippo_baseline_seed=112358_07-10-14-39-17
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_qmix:
    agent_loader: rnn_eval_agent_loader
    agent_path: mpe-pp/qmix/models/qmix_baseline_seed=112358_04-24-12-09-32
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_vdn:
    agent_loader: rnn_eval_agent_loader
    agent_path: mpe-pp/vdn/models/vdn_baseline_seed=112358_04-24-12-11-09
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_mappo:
    agent_loader: rnn_eval_agent_loader
    agent_path: mpe-pp/mappo/models/mappo_baseline_seed=112358_04-24-12-04-31
    load_step: best
    n_agents_to_populate: 3
    test_mode: True
  agent_iql:
    agent_loader: rnn_eval_agent_loader
    agent_path: mpe-pp/iql/models/iql_baseline_seed=112358_04-24-12-11-40
    load_step: best
    n_agents_to_populate: 3
    test_mode: True

# --- Experiment running params ---
repeat_id: 1
label: classifier_only
hypergroup: null
